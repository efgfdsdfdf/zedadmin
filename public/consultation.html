<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Zed - Consultation</title>
<link rel="stylesheet" href="zed.css" />
<style>
.page { padding:1rem; display:flex; flex-direction:column; gap:.8rem; height:calc(100vh - 64px); }
.head { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:.7rem .9rem; }
.msgs { flex:1; overflow:auto; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:.8rem; display:flex; flex-direction:column; gap:.55rem; }
.m { max-width:75%; border-radius:12px; padding:.55rem .7rem; font-size:.88rem; line-height:1.5; }
.mine { margin-left:auto; background:rgba(0,180,166,.22); border:1px solid rgba(0,180,166,.35); }
.other { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.18); }
.meta { color:var(--muted); font-size:.75rem; margin-top:.18rem; }
.sendbar { display:flex; gap:.55rem; }
.sendbar input { flex:1; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.18); color:#fff; border-radius:10px; padding:.62rem .72rem; }
</style>
</head>
<body>
<div class="shell">
  <div class="main">
    <div class="topbar">
      <div><div class="topbar-title">Consultation Chat</div><div class="topbar-sub" id="sub">Booking session</div></div>
      <div class="topbar-right">
        <a href="bookings.html" class="btn btn-ghost btn-sm">Back to Bookings</a>
      </div>
    </div>
    <div class="scroll-area">
      <div class="page">
        <div class="head" id="head">Loading booking...</div>
        <div class="msgs" id="msgs"></div>
        <div class="sendbar">
          <input id="msg-input" placeholder="Type your message..." />
          <button class="btn btn-primary btn-sm" onclick="sendMsg()">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="local-auth.js"></script>
<script src="zed-core.js"></script>
<script>
let me = null;
let bookingId = null;
let receiverId = null;
let channel = null;

function q(name) { return new URLSearchParams(location.search).get(name); }

async function api(path, options = {}, needsAuth = false) {
  const apiBase = (typeof ZED_API_BASE !== 'undefined' && ZED_API_BASE)
    ? ZED_API_BASE
    : ((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') && window.location.port !== '3000'
      ? 'http://localhost:3000'
      : '');
  const url = path.startsWith('/api/') ? `${apiBase}${path}` : path;
  const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
  if (needsAuth) {
    const { data } = await _supabase.auth.getSession();
    const token = data?.session?.access_token;
    if (!token) throw new Error('No active session');
    headers.Authorization = `Bearer ${token}`;
  }
  const res = await fetch(url, { ...options, headers });
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(body.error || `Request failed (${res.status})`);
  return body;
}

function renderMessages(rows) {
  const root = document.getElementById('msgs');
  root.innerHTML = (rows || []).map((m) => {
    const mine = m.sender_id === me.id;
    return `
      <div class="m ${mine ? 'mine' : 'other'}">
        <div>${m.message}</div>
        <div class="meta">${new Date(m.created_at).toLocaleTimeString()}</div>
      </div>
    `;
  }).join('');
  root.scrollTop = root.scrollHeight;
}

async function loadMessages() {
  const data = await api(`/api/telemedicine/messages/${bookingId}`, {}, true);
  renderMessages(data.messages || []);
}

async function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !receiverId) return;
  await api('/api/telemedicine/messages', {
    method: 'POST',
    body: JSON.stringify({ booking_id: bookingId, receiver_id: receiverId, message: text })
  }, true);
  input.value = '';
  loadMessages();
}

async function loadBookingContext() {
  const payload = await api(`/api/telemedicine/bookings/${bookingId}`, {}, true);
  const booking = payload.booking;
  const doctorUserId = payload.doctor_user_id;
  receiverId = me.id === booking.patient_id ? doctorUserId : booking.patient_id;

  document.getElementById('head').innerHTML = `
    <strong>Status:</strong> ${booking.status} |
    <strong>Scheduled:</strong> ${new Date(booking.scheduled_time).toLocaleString()} |
    <strong>Doctor:</strong> ${payload.doctor?.full_name || booking.doctor_id}
  `;
  document.getElementById('sub').textContent = `Booking #${booking.id.slice(0, 8)}`;
}

function subscribeRealtime() {
  if (!bookingId) return;
  channel = _supabase
    .channel(`booking-${bookingId}`)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'messages',
      filter: `booking_id=eq.${bookingId}`
    }, () => loadMessages())
    .subscribe();
}

async function init() {
  me = await ZedAuth.requireAuth();
  if (!me) return;
  bookingId = q('booking_id');
  if (!bookingId) {
    document.getElementById('head').textContent = 'Missing booking_id query parameter.';
    return;
  }
  await loadBookingContext();
  await loadMessages();
  subscribeRealtime();
}

window.addEventListener('beforeunload', () => {
  if (channel) _supabase.removeChannel(channel);
});

init();
</script>
</body>
</html>
