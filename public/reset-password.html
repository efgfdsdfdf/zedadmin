<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zed - Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root { --ink:#0a1628; --teal:#00b4a6; --sky:#4fc8e0; --err:#ff5c7a; --ok:#00d4a0; --muted:rgba(255,255,255,.58); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { min-height:100vh; font-family:'DM Sans',sans-serif; color:#fff; background:
    radial-gradient(circle at 12% 10%, rgba(0,180,166,.18), transparent 38%),
    radial-gradient(circle at 88% 85%, rgba(79,200,224,.16), transparent 42%), var(--ink);
    display:grid; place-items:center; padding:1rem; }
  .card { width:min(460px, 100%); border:1px solid rgba(255,255,255,.12); border-radius:18px; background:rgba(255,255,255,.04); backdrop-filter:blur(10px); padding:1.3rem; }
  h1 { font-family:'Syne',sans-serif; font-size:1.55rem; margin-bottom:.35rem; }
  p { color:var(--muted); line-height:1.6; font-size:.95rem; margin-bottom:1rem; }
  .field { margin-bottom:.8rem; }
  label { display:block; font-size:.8rem; margin-bottom:.35rem; color:rgba(255,255,255,.8); }
  input { width:100%; padding:.75rem .88rem; border-radius:10px; border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.05); color:#fff; outline:none; }
  input:focus { border-color:var(--teal); box-shadow:0 0 0 3px rgba(0,180,166,.16); }
  .error { color:var(--err); font-size:.78rem; min-height:1rem; margin-bottom:.3rem; }
  .actions { display:flex; gap:.65rem; margin-top:.45rem; }
  button, a.btn { border:none; text-decoration:none; cursor:pointer; border-radius:11px; padding:.75rem .95rem; font-weight:700; font-family:'Syne',sans-serif; font-size:.9rem; }
  .primary { flex:1; color:#041a20; background:linear-gradient(135deg,var(--teal),var(--sky)); }
  .ghost { color:#fff; border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.03); }
  .hint { margin-top:1rem; padding:.8rem; border-radius:10px; border:1px solid rgba(0,180,166,.35); background:rgba(0,180,166,.08); color:#c9fffa; font-size:.88rem; line-height:1.5; display:none; }
  .hint.show { display:block; }
</style>
</head>
<body>
  <main class="card">
    <h1>Reset your password</h1>
    <p>Enter your account email and we will send a password recovery message.</p>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" />
    </div>
    <div id="error" class="error"></div>

    <div class="actions">
      <button class="primary" id="send-btn" onclick="sendReset()">Send reset message</button>
      <a class="btn ghost" href="login.html">Back</a>
    </div>

    <div id="hint" class="hint">
      Reset message sent. Check your inbox, then continue to OTP verification.
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="local-auth.js"></script>
  <script src="zed-core.js"></script>
  <script>
    const emailInput = document.getElementById('email');
    const errorEl = document.getElementById('error');
    const hintEl = document.getElementById('hint');
    const sendBtn = document.getElementById('send-btn');

    const prefEmail = new URLSearchParams(window.location.search).get('email');
    if (prefEmail) emailInput.value = prefEmail;

    function validEmail(v) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    }

    async function sendReset() {
      const email = emailInput.value.trim();
      errorEl.textContent = '';
      hintEl.classList.remove('show');

      if (!validEmail(email)) {
        errorEl.textContent = 'Enter a valid email address.';
        return;
      }

      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending...';

      const { error } = await ZedAuth.resetPassword(email);

      sendBtn.disabled = false;
      sendBtn.textContent = 'Send reset message';

      if (error) {
        errorEl.textContent = error.message || 'Could not send reset message.';
        return;
      }

      hintEl.classList.add('show');
      setTimeout(() => {
        window.location.href = `verify-otp.html?email=${encodeURIComponent(email)}`;
      }, 900);
    }
  </script>
</body>
</html>
