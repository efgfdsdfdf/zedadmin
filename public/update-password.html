<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zed - Update Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root { --ink:#0a1628; --teal:#00b4a6; --sky:#4fc8e0; --err:#ff5c7a; --ok:#00d4a0; --muted:rgba(255,255,255,.58); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { min-height:100vh; font-family:'DM Sans',sans-serif; color:#fff; background:
    radial-gradient(circle at 14% 10%, rgba(0,180,166,.2), transparent 40%),
    radial-gradient(circle at 86% 82%, rgba(79,200,224,.17), transparent 44%), var(--ink);
    display:grid; place-items:center; padding:1rem; }
  .card { width:min(470px, 100%); border:1px solid rgba(255,255,255,.12); border-radius:18px; background:rgba(255,255,255,.04); backdrop-filter:blur(10px); padding:1.3rem; }
  h1 { font-family:'Syne',sans-serif; font-size:1.55rem; margin-bottom:.35rem; }
  p { color:var(--muted); line-height:1.6; font-size:.95rem; margin-bottom:1rem; }
  .field { margin-bottom:.8rem; }
  label { display:block; font-size:.8rem; margin-bottom:.35rem; color:rgba(255,255,255,.8); }
  input { width:100%; padding:.75rem .88rem; border-radius:10px; border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.05); color:#fff; outline:none; }
  input:focus { border-color:var(--teal); box-shadow:0 0 0 3px rgba(0,180,166,.16); }
  .error { color:var(--err); font-size:.78rem; min-height:1rem; margin-bottom:.3rem; }
  .ok { color:var(--ok); font-size:.82rem; min-height:1rem; margin-bottom:.2rem; }
  .actions { display:flex; gap:.65rem; margin-top:.45rem; }
  button, a.btn { border:none; text-decoration:none; cursor:pointer; border-radius:11px; padding:.75rem .95rem; font-weight:700; font-family:'Syne',sans-serif; font-size:.9rem; }
  .primary { flex:1; color:#041a20; background:linear-gradient(135deg,var(--teal),var(--sky)); }
  .ghost { color:#fff; border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.03); }
  .notice { padding:.75rem .8rem; border-radius:10px; border:1px solid rgba(255,170,68,.35); background:rgba(255,170,68,.08); color:#ffe3b6; line-height:1.5; font-size:.86rem; margin-bottom:.9rem; display:none; }
  .notice.show { display:block; }
</style>
</head>
<body>
  <main class="card">
    <h1>Update password</h1>
    <p>Create your new password. Use at least 8 characters.</p>

    <div id="notice" class="notice">
      Recovery session not found. Open the recovery link from your email again, or verify OTP first.
    </div>

    <div class="field">
      <label for="pw">New password</label>
      <input id="pw" type="password" placeholder="Enter new password" />
    </div>
    <div class="field">
      <label for="pw2">Confirm password</label>
      <input id="pw2" type="password" placeholder="Repeat new password" />
    </div>

    <div id="ok" class="ok"></div>
    <div id="error" class="error"></div>

    <div class="actions">
      <button class="primary" id="update-btn" onclick="updatePassword()">Update password</button>
      <a class="btn ghost" href="login.html">Back</a>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="local-auth.js"></script>
  <script src="zed-core.js"></script>
  <script>
    const pwInput = document.getElementById('pw');
    const pw2Input = document.getElementById('pw2');
    const updateBtn = document.getElementById('update-btn');
    const errorEl = document.getElementById('error');
    const okEl = document.getElementById('ok');
    const noticeEl = document.getElementById('notice');

    function readHash() {
      const raw = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : window.location.hash;
      return new URLSearchParams(raw);
    }

    async function ensureRecoverySession() {
      const hash = readHash();
      const hasRecoveryHash = hash.get('type') === 'recovery' || hash.get('access_token');
      if (!hasRecoveryHash) return;

      // Allow Supabase client to process hash and persist recovery session.
      await new Promise((resolve) => setTimeout(resolve, 150));
      history.replaceState({}, '', 'update-password.html');
    }

    async function updatePassword() {
      const pw = pwInput.value;
      const pw2 = pw2Input.value;
      errorEl.textContent = '';
      okEl.textContent = '';

      if (pw.length < 8) {
        errorEl.textContent = 'Password must be at least 8 characters.';
        return;
      }
      if (pw !== pw2) {
        errorEl.textContent = 'Passwords do not match.';
        return;
      }

      updateBtn.disabled = true;
      updateBtn.textContent = 'Updating...';

      const { error } = await ZedAuth.updatePassword(pw);

      updateBtn.disabled = false;
      updateBtn.textContent = 'Update password';

      if (error) {
        errorEl.textContent = error.message || 'Could not update password.';
        return;
      }

      okEl.textContent = 'Password updated successfully. Redirecting to login...';
      setTimeout(async () => {
        try {
          await ZedAuth.signOut();
        } catch (_) {
          window.location.href = 'login.html?passwordReset=1';
        }
      }, 900);
    }

    (async function init() {
      await ensureRecoverySession();
      const { session } = await ZedAuth.getSession();

      if (!session) {
        noticeEl.classList.add('show');
      }
    })();
  </script>
</body>
</html>
